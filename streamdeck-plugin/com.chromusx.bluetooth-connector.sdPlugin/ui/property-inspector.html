<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluetooth Device Connector Settings</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #2d2d2d;
            color: #d4d4d4;
            padding: 16px;
        }

        .container {
            max-width: 400px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 500;
            color: #9d9d9d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .select-row {
            display: flex;
            gap: 8px;
        }

        select {
            width: 100%;
            padding: 8px 12px;
            background-color: #3c3c3c;
            border: 1px solid #5a5a5a;
            border-radius: 4px;
            color: #d4d4d4;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: #0e7afe;
        }

        button {
            flex: 0 0 auto;
            padding: 8px 14px;
            background-color: #3c3c3c;
            border: 1px solid #5a5a5a;
            border-radius: 4px;
            color: #d4d4d4;
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }

        button:hover {
            background-color: #474747;
            border-color: #0e7afe;
        }

        button:active {
            background-color: #0e7afe;
        }

        .info-text {
            margin-top: 8px;
            font-size: 11px;
            color: #6a6a6a;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-group">
            <label for="deviceSelect">Bluetooth Device</label>
            <div class="select-row">
                <select id="deviceSelect">
                    <option value="">Detecting devices…</option>
                </select>
                <button id="refreshBtn" type="button" title="Refresh device list">⟳</button>
            </div>
            <p class="info-text">
                Select the paired device to connect. Don't see it? Pair it in your system Bluetooth settings, then click ⟳.
            </p>
        </div>
    </div>

    <script>
        let websocket = null;
        let pluginUUID = null;
        let actionInfo = {};
        let settings = {};

        const deviceSelect = document.getElementById('deviceSelect');
        const refreshBtn = document.getElementById('refreshBtn');

        function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
            pluginUUID = inUUID;
            actionInfo = JSON.parse(inActionInfo);
            settings = actionInfo.payload.settings || {};

            websocket = new WebSocket('ws://127.0.0.1:' + inPort);

            websocket.onopen = function () {
                websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));
                requestDevices();
            };

            websocket.onmessage = function (evt) {
                let data;
                try {
                    data = JSON.parse(evt.data);
                } catch (e) {
                    return;
                }
                if (
                    data.event === 'sendToPropertyInspector' &&
                    data.payload &&
                    data.payload.event === 'deviceList'
                ) {
                    populateDevices(data.payload.devices || []);
                }
            };

            websocket.onerror = function (error) {
                console.error('WebSocket Error:', error);
            };
        }

        // Ask the plugin for the list of paired Bluetooth devices.
        function requestDevices() {
            if (!websocket || websocket.readyState !== 1) return;
            deviceSelect.innerHTML = '<option value="">Detecting devices…</option>';
            websocket.send(JSON.stringify({
                event: 'sendToPlugin',
                action: actionInfo.action,
                context: pluginUUID,
                payload: { event: 'getDevices' }
            }));
        }

        // Fill the dropdown with the detected devices, preserving the saved choice.
        function populateDevices(devices) {
            const saved = settings.deviceName || '';
            deviceSelect.innerHTML = '';

            const placeholder = document.createElement('option');
            placeholder.value = '';
            placeholder.textContent = devices.length ? '— Select a device —' : 'No paired devices found';
            deviceSelect.appendChild(placeholder);

            // Keep a previously-saved device visible even if it isn't currently
            // detected, so the persisted choice is never silently lost.
            if (saved && devices.indexOf(saved) === -1) {
                const opt = document.createElement('option');
                opt.value = saved;
                opt.textContent = saved + ' (not detected)';
                opt.selected = true;
                deviceSelect.appendChild(opt);
            }

            devices.forEach(function (name) {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                if (name === saved) opt.selected = true;
                deviceSelect.appendChild(opt);
            });
        }

        // Persist the selection whenever it changes.
        deviceSelect.addEventListener('change', function () {
            settings.deviceName = deviceSelect.value;
            saveSettings();
        });

        refreshBtn.addEventListener('click', requestDevices);

        function saveSettings() {
            if (websocket && websocket.readyState === 1) {
                websocket.send(JSON.stringify({
                    event: 'setSettings',
                    context: pluginUUID,
                    payload: settings
                }));
            }
        }
    </script>
</body>
</html>
